modules:
  - type: script
    source: ghcr.io/blue-build/modules/script:latest
    snippets:
     - |
        if ! grep -qi "bluefin" /etc/os-release; then
          echo "Non-Bluefin image detected. Setting up VS Code..."          
          curl -fLsS --retry 5 --create-dirs https://microsoft.com -o /etc/yum.repos.d/vscode.repo          
          dnf install -y code
        else
          echo "Bluefin detected. Skipping VS Code setup entirely."
        fi
  - type: dnf
    source: ghcr.io/blue-build/modules/dnf:latest
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - micro
        - starship
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.brave.Browser
          - io.ente.auth
          - io.ente.photos
          - org.fedoraproject.MediaWriter
          - br.eng.silas.qpdftools
          - com.notesnook.Notesnook
          - com.collaboraoffice.Office
          - re.sonny.Eloquent
          - me.proton.Mail
          - me.proton.Pass
          - com.protonvpn.www
          - org.signal.Signal
          - com.calibre_ebook.calibre
          - org.gnome.SimpleScan
          - org.gnome.Podcasts
          - io.github.pwr_solaar.solaar
          - com.usebottles.bottles
          - io.gitlab.Goodvibes
          - com.blitzfc.qbz
          - dev.vencord.Vesktop
      - scope: user
  - type: script
    scripts:
      - remove-apps.sh
      - signal-setup.sh
  - type: signing
