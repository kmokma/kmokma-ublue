modules:
  - type: dnf
    source: ghcr.io/blue-build/modules/dnf:latest
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - micro
        - starship
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - com.brave.Browser
          - io.ente.auth
          - io.ente.photos
          - org.fedoraproject.MediaWriter
          - br.eng.silas.qpdftools
          - com.notesnook.Notesnook
          - com.collaboraoffice.Office
          - org.gnome.gedit
          - re.sonny.Eloquent
          - me.proton.Mail
          - me.proton.Pass
          - com.protonvpn.www
          - org.signal.Signal
          - com.calibre_ebook.calibre
          - org.gnome.SimpleScan
          - org.kde.kasts
          - io.github.pwr_solaar.solaar
          - com.usebottles.bottles
          - io.gitlab.Goodvibes
          - com.blitzfc.qbz
          - dev.vencord.Vesktop
      - scope: user
  - type: script
    scripts:
      - remove-apps-gnome.sh
      - remove-apps.sh
      - signal-setup.sh
  - type: signing
